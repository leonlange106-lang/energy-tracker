name: "Zählwerk"
version: "2.7.0"
slug: "zaehlwerk"
description: "Verbrauchs- & Zählerstands-Tracking (Strom, Gas, Wasser, PV). Standalone, nur SQLite."
url: "https://github.com/leonlange106-lang/energy-tracker"
arch:
  - amd64
init: false
homeassistant_api: true
ingress: true
ingress_port: 8000
panel_icon: "mdi:gauge"
panel_title: "Zählwerk"
# addon_config -> /config: DB liegt damit automatisch im normalen HA-Backup.
# share bleibt lesbar gemappt, damit die Alt-DB einmalig migriert werden kann.
map:
  - addon_config:rw
  - share:rw
