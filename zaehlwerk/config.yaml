name: "Zählwerk"
version: "2.21.0"
slug: "zaehlwerk"
description: "Verbrauchs- & Zählerstands-Tracking (Strom, Gas, Wasser, PV). Standalone, nur SQLite."
url: "https://github.com/leonlange106-lang/energy-tracker"
arch:
  - amd64
init: false
homeassistant_api: true
# mqtt:want -> Supervisor reicht die Zugangsdaten des Mosquitto-Add-ons durch,
# sofern es installiert ist. "want" statt "need": ohne Broker startet das
# Add-on trotzdem, MQTT bleibt dann einfach ungenutzt.
services:
  - mqtt:want
ingress: true
ingress_port: 8000
panel_icon: "mdi:gauge"
panel_title: "Zählwerk"
# addon_config -> /config: DB liegt damit automatisch im normalen HA-Backup.
# share bleibt lesbar gemappt, damit die Alt-DB einmalig migriert werden kann.
# backup:rw -> /backup. Ohne dieses Mapping existiert das Verzeichnis im
# Container nicht und das Backup-Modul weicht auf /share aus.
map:
  - addon_config:rw
  - share:rw
  - backup:rw
