# Optionaler Standalone-Betrieb OHNE Home Assistant.
# Für HA: das Add-on-Repository nutzen (siehe SETUP.md). Kein InfluxDB mehr.
services:
  app:
    build: ./zaehlwerk
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/zaehlwerk.db
      CORS_ORIGINS: "*"
    volumes:
      - app-data:/data
    ports:
      - "8000:8000"
    mem_limit: 256m
volumes:
  app-data:
