# Optionaler Standalone-Betrieb OHNE Home Assistant (z.B. im LXC/Docker).
# Für HA nutzt du stattdessen das Add-on (ha-addon/). Kein InfluxDB mehr nötig.

services:
  app:
    build: ./backend
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/zaehlwerk.db
      CORS_ORIGINS: "*"
    volumes:
      - app-data:/data
    ports:
      - "8000:8000"
    mem_limit: 256m

volumes:
  app-data:
