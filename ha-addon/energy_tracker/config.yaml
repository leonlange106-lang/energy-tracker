name: "Energie-Tracker"
version: "1.0.0"
slug: "energy_tracker"
description: "Energie-/Verbrauchs-Tracking (Strom, Gas, Wasser, PV) mit InfluxDB-Backend"
url: "https://github.com/leonlange106-lang/energy-tracker"
arch:
  - amd64
init: false
# --- Ingress: WebUI direkt in HA-Sidebar + HA-App, ohne separaten Port/Login ---
ingress: true
ingress_port: 8000
panel_icon: "mdi:lightning-bolt"
panel_title: "Energie"
# --- Konfigurierbar in der HA-UI: Verbindung zur InfluxDB im LXC ---
options:
  influx_url: "http://192.168.178.XX:8086"
  influx_token: ""
  influx_org: "energy"
  influx_bucket: "readings"
schema:
  influx_url: str
  influx_token: password
  influx_org: str
  influx_bucket: str
